# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    # Compile .mo files before Sphinx runs autodoc (i18n.py imports them)
    pre_build:
      - make translations

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev

sphinx:
  configuration: doc/conf.py
  builder: html
  fail_on_warning: false
