name: CI

on:
  push:
    branches: ["main", "develop"]
    # Trigger the release pipeline only on strict semver tags (vX.Y.Z).
    # Tags like v1.0.0-alpha or v1.0 are intentionally excluded.
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: ["main"]

# Opt into Node.js 24 early for all actions (Node.js 20 deprecated June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ---------------------------------------------------------------------------
# Shared helper: compile .po files with pybabel (works on Linux/Windows/macOS
# without requiring gettext to be installed as a system package).
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # Tests  – run on every branch push, PR, and semver tag
  # -------------------------------------------------------------------------
  test:
    name: Test – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libxkbcommon-x11-0 libdbus-1-3 \
            xvfb x11-utils gettext

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch

      - name: Compile translations
        run: |
          for lang in en fr es it ru vi zh_CN; do
            msgfmt locales/$lang/LC_MESSAGES/messages.po \
                   -o locales/$lang/LC_MESSAGES/messages.mo
          done

      - name: Run tests
        run: xvfb-run --auto-servernum pytest
        env:
          QT_QPA_PLATFORM: offscreen

  # -------------------------------------------------------------------------
  # Documentation  – branch pushes only (skip on tag releases)
  # -------------------------------------------------------------------------
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gettext

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Compile translations
        run: |
          for lang in en fr es it ru vi zh_CN; do
            msgfmt locales/$lang/LC_MESSAGES/messages.po \
                   -o locales/$lang/LC_MESSAGES/messages.mo
          done

      - name: Build Sphinx documentation
        run: make docs

      - name: Upload documentation artefact
        uses: actions/upload-artifact@v6
        with:
          name: docs-html
          path: doc/_build/html/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Build helpers  – shared steps expressed as a reusable fragment.
  # Each platform job: installs Python deps, compiles UI/resources/translations,
  # runs PyInstaller, uploads the executable as a workflow artifact.
  # -------------------------------------------------------------------------

  build-linux:
    name: Build – Linux (amd64)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libxkbcommon-x11-0 libdbus-1-3

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install ".[dev]" pyinstaller babel

      - name: Compile UI files and Qt resources
        run: |
          pyuic5 src/pbprompt/gui/main_window.ui    -o src/pbprompt/gui/ui_main_window.py
          pyuic5 src/pbprompt/gui/settings_dialog.ui -o src/pbprompt/gui/ui_settings_dialog.py
          pyuic5 src/pbprompt/gui/about_dialog.ui    -o src/pbprompt/gui/ui_about_dialog.py
          pyrcc5 resources/resources.qrc             -o src/pbprompt/gui/resources_rc.py

      - name: Compile translations
        run: pybabel compile -d locales -D messages

      - name: Build Linux executable
        run: |
          pyinstaller \
            --onefile --windowed \
            --name pbprompt \
            --add-data "locales:locales" \
            --add-data "resources:resources" \
            --paths src \
            src/pbprompt/__main__.py

      - name: Upload Linux executable
        uses: actions/upload-artifact@v6
        with:
          name: executable-linux
          path: dist/pbprompt
          if-no-files-found: error

  build-windows:
    name: Build – Windows (amd64)
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install ".[dev]" pyinstaller babel

      - name: Compile UI files and Qt resources
        shell: bash
        run: |
          pyuic5 src/pbprompt/gui/main_window.ui    -o src/pbprompt/gui/ui_main_window.py
          pyuic5 src/pbprompt/gui/settings_dialog.ui -o src/pbprompt/gui/ui_settings_dialog.py
          pyuic5 src/pbprompt/gui/about_dialog.ui    -o src/pbprompt/gui/ui_about_dialog.py
          pyrcc5 resources/resources.qrc             -o src/pbprompt/gui/resources_rc.py

      - name: Compile translations
        run: pybabel compile -d locales -D messages

      - name: Build Windows executable
        # Use bash so path separators and quoting are consistent across platforms.
        shell: bash
        run: |
          pyinstaller \
            --onefile --windowed \
            --name pbprompt \
            --add-data "locales:locales" \
            --add-data "resources:resources" \
            --paths src \
            src/pbprompt/__main__.py

      - name: Upload Windows executable
        uses: actions/upload-artifact@v6
        with:
          name: executable-windows
          path: dist/pbprompt.exe
          if-no-files-found: error

  build-macos:
    name: Build – macOS (arm64)
    # macos-14 provides an Apple Silicon (arm64/M1) runner.
    # macos-13 (Intel x86_64) is being deprecated and frequently cancelled on
    # the free tier; macos-14 is faster, more available, and natively supported
    # on all Apple Silicon Macs (M1/M2/M3).
    runs-on: macos-14
    timeout-minutes: 30
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install ".[dev]" pyinstaller babel

      - name: Compile UI files and Qt resources
        run: |
          pyuic5 src/pbprompt/gui/main_window.ui    -o src/pbprompt/gui/ui_main_window.py
          pyuic5 src/pbprompt/gui/settings_dialog.ui -o src/pbprompt/gui/ui_settings_dialog.py
          pyuic5 src/pbprompt/gui/about_dialog.ui    -o src/pbprompt/gui/ui_about_dialog.py
          pyrcc5 resources/resources.qrc             -o src/pbprompt/gui/resources_rc.py

      - name: Compile translations
        run: pybabel compile -d locales -D messages

      - name: Build macOS executable
        run: |
          pyinstaller \
            --onefile --windowed \
            --name pbprompt \
            --osx-bundle-identifier com.pbmou.pbprompt \
            --add-data "locales:locales" \
            --add-data "resources:resources" \
            --paths src \
            src/pbprompt/__main__.py

      - name: Upload macOS executable
        uses: actions/upload-artifact@v6
        with:
          name: executable-macos
          path: dist/pbprompt
          if-no-files-found: error
          # Note: artifact contains the arm64 binary built on macos-14 (M1).

  # -------------------------------------------------------------------------
  # Release  – assembles all artefacts and publishes a GitHub Release
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write   # required to create a GitHub Release

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # Build the source archives (make dist reads the version from __init__.py).
      - name: Build source archives
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gettext
          pip install --upgrade pip && pip install ".[dev]"
          for lang in en fr es it ru vi zh_CN; do
            msgfmt locales/$lang/LC_MESSAGES/messages.po \
                   -o locales/$lang/LC_MESSAGES/messages.mo
          done
          make dist

      # Download all three platform executables into their artifact directories.
      - name: Download build artifacts
        uses: actions/download-artifact@v7

      # Rename executables to include the version tag before uploading to the
      # release (e.g. pbprompt-v1.0.1-linux-amd64).
      - name: Rename executables
        run: |
          TAG="${{ github.ref_name }}"
          mv executable-linux/pbprompt       dist/pbprompt-${TAG}-linux-amd64
          mv executable-windows/pbprompt.exe dist/pbprompt-${TAG}-windows-amd64.exe
          mv executable-macos/pbprompt       dist/pbprompt-${TAG}-macos-arm64
          chmod +x dist/pbprompt-${TAG}-linux-amd64 dist/pbprompt-${TAG}-macos-arm64

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/extract_changelog.py "${{ github.ref_name }}" \
            > /tmp/release_notes.md
          gh release create "${{ github.ref_name }}" \
            --title "PBPrompt ${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            dist/pbprompt-*.tar.gz \
            dist/pbprompt-*.zip \
            dist/pbprompt-*-linux-amd64 \
            dist/pbprompt-*-windows-amd64.exe \
            dist/pbprompt-*-macos-arm64

      - name: Clean up old Read the Docs versions
        env:
          RTD_TOKEN: ${{ secrets.READTHEDOCS_TOKEN }}
        run: python scripts/rtd_cleanup.py --project pbprompt --token "$RTD_TOKEN"
        continue-on-error: true
