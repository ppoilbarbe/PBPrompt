name: CI

on:
  push:
    branches: ["main", "develop"]
    # Trigger the release pipeline only on strict semver tags (vX.Y.Z).
    # Tags like v1.0.0-alpha or v1.0 are intentionally excluded.
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: ["main"]

# Cancel in-flight runs for the same ref when a newer push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 early for all actions (Node.js 20 deprecated June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Required by PySide6 on headless runners (offscreen Qt platform plugin).
  QT_QPA_PLATFORM: offscreen

# ---------------------------------------------------------------------------
# Shared setup used by every job:
#   - micromamba creates/restores the conda env from environment.yml
#   - pip install -e . --no-deps is a dedicated step (not post-create-command)
#     so it runs on every invocation, including cache-restore runs
#   - make all NOCONDA=1 compiles UI, resources and translations
# All make invocations use NOCONDA=1 because the conda env is already active.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # Tests  – run on every branch push, PR, and semver tag
  # -------------------------------------------------------------------------
  test:
    name: Test – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          # micromamba 2.6.x crashes on Windows (mamba-org/setup-micromamba#306)
          micromamba-version: "2.5.0-2"
          create-args: --channel-priority strict python=${{ matrix.python-version }}
          init-shell: bash
          cache-environment: true

      - name: Install package (editable)
        run: pip install -e . --no-deps
        shell: bash -el {0}

      - name: Build (UI, resources, translations)
        run: make all NOCONDA=1
        shell: bash -el {0}

      - name: Run tests
        run: make test NOCONDA=1
        shell: bash -el {0}

  # -------------------------------------------------------------------------
  # Pre-commit hooks  – run in parallel with test
  # -------------------------------------------------------------------------
  hooks:
    name: Pre-commit hooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          micromamba-version: "2.5.0-2"
          create-args: --channel-priority strict
          init-shell: bash
          cache-environment: true

      - name: Cache pre-commit hook environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run hooks on all files
        run: pre-commit run --all-files
        shell: bash -el {0}
        env:
          SKIP: no-commit-to-branch

  # -------------------------------------------------------------------------
  # Documentation  – branch pushes only (skip on tag releases)
  # -------------------------------------------------------------------------
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          # micromamba 2.6.x crashes on Windows (mamba-org/setup-micromamba#306)
          micromamba-version: "2.5.0-2"
          create-args: --channel-priority strict
          init-shell: bash
          cache-environment: true

      - name: Install package (editable)
        run: pip install -e . --no-deps
        shell: bash -el {0}

      - name: Build (UI, resources, translations)
        run: make all NOCONDA=1
        shell: bash -el {0}

      - name: Build Sphinx documentation
        run: make docs NOCONDA=1
        shell: bash -el {0}

      - name: Upload documentation artefact
        uses: actions/upload-artifact@v6
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Build helpers  – produce a standalone executable per platform via
  # `make dist NOCONDA=1` (PyInstaller is provided by environment.yml).
  # -------------------------------------------------------------------------

  build-linux:
    name: Build – Linux (amd64)
    runs-on: ubuntu-latest
    needs: [test, hooks]

    steps:
      - uses: actions/checkout@v5

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          # micromamba 2.6.x crashes on Windows (mamba-org/setup-micromamba#306)
          micromamba-version: "2.5.0-2"
          create-args: --channel-priority strict
          init-shell: bash
          cache-environment: true

      - name: Install package (editable)
        run: pip install -e . --no-deps
        shell: bash -el {0}

      - name: Build executable
        run: make dist NOCONDA=1
        shell: bash -el {0}

      - name: Upload Linux executable
        uses: actions/upload-artifact@v6
        with:
          name: executable-linux
          path: dist/pbprompt-*-linux-*
          if-no-files-found: error

  build-windows:
    name: Build – Windows (amd64)
    runs-on: windows-latest
    needs: [test, hooks]

    steps:
      - uses: actions/checkout@v5

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          # micromamba 2.6.x crashes on Windows (mamba-org/setup-micromamba#306)
          micromamba-version: "2.5.0-2"
          create-args: --channel-priority strict
          init-shell: bash
          cache-environment: true

      - name: Install package (editable)
        run: pip install -e . --no-deps
        shell: bash -el {0}

      - name: Build executable
        run: make dist NOCONDA=1
        shell: bash -el {0}

      - name: Upload Windows executable
        uses: actions/upload-artifact@v6
        with:
          name: executable-windows
          path: dist/pbprompt-*.exe
          if-no-files-found: error

  build-macos:
    name: Build – macOS (arm64)
    # macos-14 provides an Apple Silicon (arm64/M1) runner.
    # macos-13 (Intel x86_64) is being deprecated and frequently cancelled on
    # the free tier; macos-14 is faster, more available, and natively supported
    # on all Apple Silicon Macs (M1/M2/M3).
    runs-on: macos-14
    timeout-minutes: 30
    needs: [test, hooks]

    steps:
      - uses: actions/checkout@v5

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          # micromamba 2.6.x crashes on Windows (mamba-org/setup-micromamba#306)
          micromamba-version: "2.5.0-2"
          create-args: --channel-priority strict
          init-shell: bash
          cache-environment: true

      - name: Install package (editable)
        run: pip install -e . --no-deps
        shell: bash -el {0}

      - name: Build executable
        run: make dist NOCONDA=1
        shell: bash -el {0}

      - name: Upload macOS executable
        uses: actions/upload-artifact@v6
        with:
          name: executable-macos
          path: dist/pbprompt-*-darwin-*
          if-no-files-found: error
          # Note: artifact contains the arm64 binary built on macos-14 (M1).

  # -------------------------------------------------------------------------
  # Release  – assembles all artefacts and publishes a GitHub Release
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write   # required to create a GitHub Release

    steps:
      - uses: actions/checkout@v5

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          # micromamba 2.6.x crashes on Windows (mamba-org/setup-micromamba#306)
          micromamba-version: "2.5.0-2"
          create-args: --channel-priority strict
          init-shell: bash
          cache-environment: true

      - name: Install package (editable)
        run: pip install -e . --no-deps
        shell: bash -el {0}

      # make srcdist depends on make all (UI + resources + translations).
      - name: Build source archives
        run: make srcdist NOCONDA=1
        shell: bash -el {0}

      # Download all three platform executables into their artifact directories.
      - name: Download build artifacts
        uses: actions/download-artifact@v7

      # Rename executables to include the version tag before uploading to the
      # release (e.g. pbprompt-v1.0.1-linux-amd64).
      # upload-artifact@v6 strips the dist/ prefix, so downloaded files
      # land directly under executable-<os>/.
      - name: Rename executables
        run: |
          TAG="${{ github.ref_name }}"
          mv executable-linux/pbprompt-*       dist/pbprompt-${TAG}-linux-amd64
          mv executable-windows/pbprompt-*.exe dist/pbprompt-${TAG}-windows-amd64.exe
          mv executable-macos/pbprompt-*       dist/pbprompt-${TAG}-macos-arm64
          chmod +x dist/pbprompt-${TAG}-linux-amd64 dist/pbprompt-${TAG}-macos-arm64

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python tools/extract_changelog.py "${{ github.ref_name }}" \
            > /tmp/release_notes.md
          gh release create "${{ github.ref_name }}" \
            --title "PBPrompt ${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            dist/pbprompt-*.tar.gz \
            dist/pbprompt-*.zip \
            dist/pbprompt-*-linux-amd64 \
            dist/pbprompt-*-windows-amd64.exe \
            dist/pbprompt-*-macos-arm64

      - name: Clean up old Read the Docs versions
        env:
          RTD_TOKEN: ${{ secrets.READTHEDOCS_TOKEN }}
        run: python tools/rtd_cleanup.py --project pbprompt --token "$RTD_TOKEN"
        continue-on-error: true
