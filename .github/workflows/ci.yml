name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libxkbcommon-x11-0 libdbus-1-3 \
            xvfb x11-utils gettext

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch

      - name: Compile translations
        run: |
          for lang in en fr es it ru vi zh_CN; do
            msgfmt locales/$lang/LC_MESSAGES/messages.po \
                   -o locales/$lang/LC_MESSAGES/messages.mo
          done

      - name: Run tests
        run: xvfb-run --auto-servernum pytest
        env:
          QT_QPA_PLATFORM: offscreen

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gettext

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Compile translations
        run: |
          for lang in en fr es it ru vi zh_CN; do
            msgfmt locales/$lang/LC_MESSAGES/messages.po \
                   -o locales/$lang/LC_MESSAGES/messages.mo
          done

      - name: Build Sphinx documentation
        run: make docs

      - name: Upload documentation artefact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: doc/_build/html/
          retention-days: 7

      # Trigger a Read the Docs build on pushes to main only.
      # Requires a READTHEDOCS_TOKEN secret (project API token from RTD).
      - name: Trigger Read the Docs build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          curl -s -X POST \
            -H "Authorization: Token ${{ secrets.READTHEDOCS_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://readthedocs.org/api/v3/projects/pbprompt/versions/latest/builds/
        continue-on-error: true   # do not fail CI if RTD is unavailable
